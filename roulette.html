<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL: RUIN ROULETTE v1.1 (PREDATORY REWARDS)</title>
    <style>
        :root { --blue: #1d9bf0; --red: #ff4d4d; --gold: #ffd700; --green: #28a745; --bg: #000; --panel: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; align-items: center; justify-content: center; }
        
        .nav-links { position: absolute; top: 0; width: 100%; background: #050505; border-bottom: 1px solid #222; padding: 15px 25px; display: flex; gap: 20px; font-family: monospace; font-size: 0.85rem; z-index: 100; }
        .nav-links a { color: #666; text-decoration: none; transition: 0.2s; font-weight: bold; }
        .nav-links a:hover { color: var(--gold); }
        .nav-links a.active { color: var(--blue); }

        .roulette-container { position: relative; width: 500px; height: 500px; margin-top: 50px; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #222; transition: transform 5s cubic-bezier(0.15, 0, 0.1, 1); filter: drop-shadow(0 0 20px #000); }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 40px; height: 40px; background: var(--gold); clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; filter: drop-shadow(0 0 10px var(--gold)); }
        
        .result-overlay { margin-top: 30px; text-align: center; min-height: 120px; width: 80%; max-width: 600px; padding: 20px; background: #050505; border: 1px solid #222; border-radius: 10px; }
        #status-text { font-family: monospace; font-size: 1rem; color: #555; text-transform: uppercase; }
        #outcome-desc { font-size: 1.4rem; font-weight: bold; color: var(--gold); margin-top: 10px; line-height: 1.2; }

        .spin-btn { background: var(--gold); color: #000; border: none; padding: 18px 50px; font-size: 1.3rem; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 20px; transition: 0.3s; text-transform: uppercase; }
        .spin-btn:hover { background: #fff; transform: scale(1.05); }
        .spin-btn:disabled { background: #111; color: #444; cursor: not-allowed; transform: scale(1); }

        .stat-bar { position: absolute; bottom: 20px; right: 20px; background: #0a0a0a; padding: 15px; border: 1px solid #222; border-radius: 5px; text-align: right; }
        .stat-bar p { margin: 0; font-size: 0.7rem; color: #444; }
        .stat-bar h3 { margin: 0; color: var(--blue); font-family: monospace; }
        
        @keyframes glitch { 0% { color: var(--gold); } 50% { color: var(--red); } 100% { color: var(--gold); } }
        .master-claimed { animation: glitch 0.2s infinite; }
    </style>
</head>
<body>

    <div class="nav-links">
        <a href="index.html">TERMINAL</a>
        <a href="#" class="active">RUIN ROULETTE</a>
        <a href="brainrotgallery.html">BRAINROT GALLERY</a>
    </div>

    <div class="roulette-container">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>

    <div class="result-overlay">
        <div id="status-text">The Roster is Watching...</div>
        <div id="outcome-desc">SPIN TO TEST YOUR LUCK</div>
        <button class="spin-btn" id="spinBtn" onclick="spinWheel()">SPIN FOR $100</button>
    </div>

    <div class="stat-bar">
        <p>CURRENT BALANCE</p>
        <h3 id="bal-display">$0.00</h3>
    </div>

    <script>
        const doms = ["@Sapnap", "@RossLynch", "@Roier", "@Cellbit", "@Quackity", "@fingoat7", "@welshgodfeet", "@Master_S_alpha", "@tallfindom", "@CashAlphaV", "@OliveRioter", "@CashAlphaVictor", "@ImMasterCharles", "@AlphagodmasonX", "@GoonerSunny"];

        const options = [
            { text: "THE GOLDEN HANDCUFFS", color: "#ffd700", desc: "Win $5,000... but 70% goes to Master immediately." },
            { text: "CLEAN THE BOOKS", color: "#28a745", desc: "Lifetime Debt reset to $0! (Cost: All current funds)." },
            { text: "PREMIUM SLAVE", color: "#1d9bf0", desc: "2x Task Rewards! (But $50 tax per message sent)." },
            { text: "MASTER'S PROTECTION", color: "#001a2c", desc: "No distractions for 10m. (Master keeps all earnings during this time)." },
            { text: "PITY FUND", color: "#111", desc: "Win $500. But you must tribute $1,000 by tomorrow." },
            { text: "INSTANT INSOLVENCY", color: "#ff4d4d", desc: "1 Hour Lockout. No exceptions." },
            { text: "DOUBLE OR RUIN", color: "#4d0000", desc: "Double your balance OR go to $0. (Master decides)." },
            { text: "THE TIP JAR", color: "#0a0a0a", desc: "You win $1. The Roster wins your dignity." }
        ];

        let balance = parseFloat(localStorage.getItem('fakeBalance')) || 1000;
        let wasted = parseFloat(localStorage.getItem('totalWasted')) || 0;
        let currentRotation = 0;
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');

        function updateUI() {
            document.getElementById('bal-display').innerText = `$${balance.toFixed(2)}`;
            localStorage.setItem('fakeBalance', balance);
            localStorage.setItem('totalWasted', wasted);
        }

        function drawWheel() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2;
            const sliceAngle = (2 * Math.PI) / options.length;

            options.forEach((opt, i) => {
                ctx.beginPath();
                ctx.fillStyle = opt.color;
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fill();
                ctx.strokeStyle = "#222";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = (opt.color === "#ffd700") ? "#000" : "#fff";
                ctx.font = "bold 13px monospace";
                ctx.fillText(opt.text, radius - 30, 5);
                ctx.restore();
            });
        }

        function spinWheel() {
            if (balance < 100) { addLog("INSUFFICIENT FUNDS.", "negative"); return; }
            balance -= 100; updateUI();
            
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            document.getElementById('status-text').innerText = "THE MASTERS ARE DECIDING...";
            document.getElementById('outcome-desc').innerText = "---";
            document.getElementById('outcome-desc').classList.remove('master-claimed');

            const extraSpins = Math.floor(Math.random() * 5) + 7;
            const randomStop = Math.floor(Math.random() * 360);
            currentRotation += (extraSpins * 360) + randomStop;

            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const actualDegree = currentRotation % 360;
                const sliceSize = 360 / options.length;
                const index = Math.floor(((360 - actualDegree + 90) % 360) / sliceSize);
                const result = options[index % options.length];
                
                applyResult(result);
                btn.disabled = false;
            }, 5000);
        }

        function applyResult(res) {
            const master = doms[Math.floor(Math.random() * doms.length)];
            const status = document.getElementById('status-text');
            const desc = document.getElementById('outcome-desc');
            
            status.innerText = `${master} HAS CLAIMED THE RESULT:`;
            desc.innerText = res.text;
            desc.classList.add('master-claimed');

            setTimeout(() => {
                desc.innerText = res.desc;
                
                switch(res.text) {
                    case "THE GOLDEN HANDCUFFS":
                        balance += 5000;
                        let cut = 3500;
                        balance -= cut; wasted += cut;
                        addLog(`${master} took $3,500 from your jackpot.`, "negative");
                        break;
                    case "CLEAN THE BOOKS":
                        wasted = 0;
                        balance = 0;
                        addLog(`Balance purged to reset lifetime debt.`, "negative");
                        break;
                    case "PREMIUM SLAVE":
                        balance += 200; // Small bait
                        addLog(`Multiplier active, but message taxes applied.`, "positive");
                        break;
                    case "INSTANT INSOLVENCY":
                        localStorage.setItem('lockoutTime', 3600);
                        window.location.href = "index.html";
                        break;
                    case "DOUBLE OR RUIN":
                        if(Math.random() > 0.8) { balance *= 2; addLog("Mercy shown. Balance doubled.", "positive"); }
                        else { balance = 0; addLog(`${master} decided you don't need money.`, "negative"); }
                        break;
                    default:
                        balance -= 50;
                        addLog(`Small loss to ${master}.`, "negative");
                }
                updateUI();
            }, 1500);
        }

        function addLog(msg, type) {
            let logs = JSON.parse(localStorage.getItem('burnLogs')) || [];
            logs.unshift({ msg: `[ROULETTE] ${msg}`, type: type });
            localStorage.setItem('burnLogs', JSON.stringify(logs.slice(0, 50)));
        }

        drawWheel();
        updateUI();
    </script>
</body>

        function processResult(res) {

                case "POCKET CHANGE (+5)":

                    break;
                default:
                    let loss = Math.floor(Math.random() * 100) + 20;
                    balance -= loss;
                    desc.innerText = `Unlucky. ${master} claims $${loss}.`;
            }

            updateUI();
            
            // Log to terminal if possible
            let logs = JSON.parse(localStorage.getItem('burnLogs')) || [];
            logs.unshift({ msg: `[ROULETTE] ${master} forced result: ${res.text}`, type: "negative" });
            localStorage.setItem('burnLogs', JSON.stringify(logs.slice(0, 50)));
        }

        drawWheel();
        updateUI();
    </script>
