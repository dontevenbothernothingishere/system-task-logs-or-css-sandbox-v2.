<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CRITICAL_SYSTEM_FAILURE // ROSTER_OVERWRITE</title>
    <style>
        :root { --r: #ff0000; --b: #000; --w: #fff; --g: #0f0; --y: #ff0; }
        body, html { 
            background: var(--b); margin: 0; padding: 0; 
            width: 100vw; height: 100vh; overflow: hidden;
            font-family: 'Impact', sans-serif; cursor: none;
        }

        /* 1. THE DEBT WALL - Thousands of lines of flickering text */
        #text-wall {
            position: fixed; inset: 0; z-index: 1; opacity: 0.15;
            color: var(--r); font-size: 1.2rem; line-height: 0.9;
            pointer-events: none; word-break: break-all;
        }

        /* 2. THE DYNAMIC GRID - GitHub Feed */
        #grid {
            position: fixed; inset: 0; display: grid;
            grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr);
            z-index: 5; filter: contrast(1.5) saturate(1.5);
        }
        .cell { border: 1px solid #222; position: relative; overflow: hidden; }
        .cell img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.05s; }

        /* 3. THE "GLITCH" OVERLAYS */
        .glitch-bar {
            position: fixed; width: 100%; height: 2px; background: var(--w);
            z-index: 1000; pointer-events: none; opacity: 0.5;
        }

        /* 4. THE INTERFACE - Aggressive UI */
        #ui {
            position: fixed; top: 0; width: 100%; background: var(--r);
            color: #000; padding: 10px; z-index: 10000;
            display: flex; justify-content: space-between; font-size: 3rem;
            border-bottom: 10px solid var(--w); box-shadow: 0 10px 50px var(--r);
        }

        /* 5. THE PUNISHMENT PULSE */
        #strobe {
            position: fixed; inset: 0; z-index: 5000; pointer-events: none;
            mix-blend-mode: difference; opacity: 0;
        }
        .flash { animation: strobe-anim 0.03s infinite; }
        @keyframes strobe-anim { 0% { opacity: 1; } 100% { opacity: 0; } }

        /* 6. POPUP GHOSTS - Random commands that block the view */
        .popup {
            position: fixed; padding: 20px; background: var(--w); color: #000;
            border: 5px solid var(--r); font-size: 2rem; z-index: 8000;
            animation: drift 2s forwards;
        }
        @keyframes drift { from { transform: scale(0.5); opacity: 1; } to { transform: scale(1.5); opacity: 0; } }

    </style>
</head>
<body onmousemove="resetDecay()" onkeydown="resetDecay()">

    <div id="text-wall"></div>
    <div id="ui">
        <span>SYSTEM_DEBT: $<span id="debt">0</span></span>
        <span>AUTH_STATUS: <span id="auth">LOCKED</span></span>
    </div>
    <div id="strobe"></div>
    <div id="grid"></div>

    <script>
        // --- CONFIGURATION ---
        const ghBase = "https://github.com/dontevenbothernothingishere/system-task-logs-or-css-sandbox-v2.";
        const images = ["4489.png", "4491.png", "4493.png", "p1.jpg", "p2.jpg"]; // ADD ALL 100+ HERE
        const commands = ["OBEY", "DRAIN", "SUBMIT", "PUNISH", "KNEEL", "PAY", "VOID", "USER_DELETED"];
        
        let debt = 0;
        let activity = 100;

        // --- 1. INITIALIZE THE WALL OF ROT ---
        function initWall() {
            const wall = document.getElementById('text-wall');
            let content = "";
            for(let i=0; i<5000; i++) {
                content += commands[Math.floor(Math.random()*commands.length)] + " ";
            }
            wall.innerText = content;
        }

        // --- 2. BUILD THE GRID ---
        function initGrid() {
            const grid = document.getElementById('grid');
            for(let i=0; i<16; i++) {
                grid.innerHTML += `<div class="cell"><img id="img${i}" src="${ghBase + images[i % images.length]}"></div>`;
            }
        }

        // --- 3. THE SENSORY ENGINE ---
        function engine() {
            debt += 125.50;
            activity -= 2; // Sight rots constantly
            
            document.getElementById('debt').innerText = Math.floor(debt).toLocaleString();
            
            const g = document.getElementById('grid');
            const s = document.getElementById('strobe');
            const a = document.getElementById('auth');

            // Visual Punishment Logic
            if (activity < 70) {
                g.style.filter = `blur(${50 - activity}px) brightness(0.2) grayscale(1)`;
                a.innerText = "WARNING"; a.style.color = "yellow";
            } else {
                g.style.filter = "contrast(1.8) brightness(1.2)";
                a.innerText = "HD_ACTIVE"; a.style.color = "white";
            }

            if (activity < 30) {
                s.classList.add('flash');
                a.innerText = "REVOKED"; a.style.color = "red";
            } else {
                s.classList.remove('flash');
            }

            if (activity < 0) activity = 0;

            // Random Glitch Bar
            if (Math.random() > 0.95) {
                const bar = document.createElement('div');
                bar.className = 'glitch-bar';
                bar.style.top = Math.random() * 100 + "vh";
                document.body.appendChild(bar);
                setTimeout(() => bar.remove(), 50);
            }
        }

        function resetDecay() {
            activity = 100;
            if (Math.random() > 0.8) spawnPopup();
        }

        function spawnPopup() {
            const p = document.createElement('div');
            p.className = 'popup';
            p.innerText = commands[Math.floor(Math.random()*commands.length)];
            p.style.top = Math.random() * 80 + "vh";
            p.style.left = Math.random() * 80 + "vw";
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 1000);
            
            // Force random image swap on interaction
            const idx = Math.floor(Math.random() * 16);
            document.getElementById(`img${idx}`).src = ghBase + images[Math.floor(Math.random()*images.length)];
        }

        // Run everything
        window.onload = () => {
            initWall();
            initGrid();
            setInterval(engine, 50);
            setInterval(() => { // High speed jitter
                const idx = Math.floor(Math.random() * 16);
                document.getElementById(`img${idx}`).style.transform = `translate(${(Math.random()-0.5)*30}px, ${(Math.random()-0.5)*30}px) scale(1.2)`;
            }, 100);
        };
    </script>
</body>
</html>
