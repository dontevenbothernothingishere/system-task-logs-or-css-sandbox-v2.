        function start() {
            if(!audio) {
                audio = new (window.AudioContext || window.webkitAudioContext)();
                const o = audio.createOscillator();
                const g = audio.createGain();
                o.type = 'sawtooth';
                o.frequency.value = 33; // Binaural brainwave interference
                g.gain.value = 0.7;
                o.connect(g); g.connect(audio.destination);
                o.start();
                document.documentElement.requestFullscreen();
            }

            // TICKER

                debt += Math.random() * 999.99;
                document.getElementById('d').innerText = Math.floor(debt).toLocaleString();

            // CRAWL GENERATOR

                const c = document.createElement('div');
                c.className = 'crawl';
                c.innerText = h[Math.floor(Math.random()*h.length)];
                c.style.top = Math.random() * 90 + "vh";
                c.style.left = "-100vw";
                document.body.appendChild(c);
                let p = -100;
                let m = setInterval(() => {
                    p += 8; c.style.left = p + "vw";
                    if(p > 150) { clearInterval(m); c.remove(); }
                }, 5);
            }, 500);

            // TRIBUTE CYCLE (8 SECONDS)
            setInterval(triggerLock, 8000);
        }

        function triggerLock() {
            const lock = document.getElementById('lock');
            const input = document.getElementById('i');
            const prompt = document.getElementById('p');
            const target = h[Math.floor(Math.random()*h.length)].toUpperCase();
            prompt.innerText = `TYPE TO CONTINUE SUBMISSION: "${target}"`;
            lock.style.display = 'flex'; input.value = ''; input.focus();
            input.oninput = () => { if(input.value.toUpperCase() === target) lock.style.display = 'none'; };
        }
