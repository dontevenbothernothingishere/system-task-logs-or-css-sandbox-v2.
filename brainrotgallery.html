<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE ROSTER // REQUISITION_PORTAL</title>
    <style>
        :root { --gold: #af944d; --dark: #050505; --red: #660000; --card: #121212; }
        body { 
            background: var(--dark); color: #888; font-family: 'Times New Roman', serif; 
            margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center;
        }

        h1 { color: var(--gold); font-size: 2.5rem; letter-spacing: 8px; border-bottom: 2px solid var(--gold); margin-bottom: 50px; }

        .master-group { width: 100%; max-width: 1100px; margin-bottom: 60px; }
        .master-label { 
            font-size: 1.8rem; color: var(--gold); margin-bottom: 20px; 
            text-transform: uppercase; border-left: 4px solid var(--red); padding-left: 15px;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; }

        /* The Tribute Card */
        .card {
            background: var(--card); height: 350px; border: 1px solid #222;
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        .master-img { width: 100%; height: 100%; object-fit: cover; filter: blur(50px) brightness(0.2); transition: 1s ease; }
        .unlocked { filter: blur(0px) brightness(1) !important; }

        /* The Overlay */
        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
            background: rgba(0,0,0,0.6); transition: 0.5s;
        }

        .price-tag { color: var(--gold); font-size: 1.2rem; margin-bottom: 10px; font-weight: bold; }
        
        .pay-btn {
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 12px 25px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s;
        }
        .pay-btn:hover { background: var(--gold); color: black; }

        /* Session Stats */
        #stat-bar {
            position: fixed; top: 0; width: 100%; background: #000; border-bottom: 1px solid #333;
            display: flex; justify-content: space-around; padding: 15px; font-size: 1.2rem; z-index: 1000;
        }
        .val { color: var(--gold); font-weight: bold; }
        
        .timer-display { position: absolute; top: 10px; right: 10px; color: var(--red); font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div id="stat-bar">
        <div>SESSION DEBT: <span class="val">$<span id="debt">0.00</span></span></div>
        <div>STATUS: <span class="val" id="status">UNWORTHY</span></div>
    </div>

    <h1>THE ROSTER</h1>

    <div class="master-group">
        <div class="master-label">Master 1 // Primary</div>
        <div class="grid" id="grid-1"></div>
    </div>

    <div class="master-group">
        <div class="master-label">Master 2 // Secondary</div>
        <div class="grid" id="grid-2"></div>
    </div>

    <script>
        // Update these with your GitHub links
        const ghBase = "https://raw.githubusercontent.com/dontevenbothernothingishere/system-task-logs-or-css-sandbox-v2./main/";
        
        const roster = {
            m1: ["1773158742576.jpeg", "sapnapfeet_02.jpg", "sapnapfeet_01.jpg"],
            m2: ["p4.jpg", "p5.jpg", "p6.jpg"]
        };

        let sessionDebt = 0;

        function build() {
            Object.keys(roster).forEach((m, i) => {
                const grid = document.getElementById(`grid-${i+1}`);
                roster[m].forEach((img, idx) => {
                    grid.innerHTML += `
                        <div class="card" id="card-${m}-${idx}">
                            <div class="timer-display" id="timer-${m}-${idx}">60s</div>
                            <div class="overlay" id="overlay-${m}-${idx}">
                                <div class="price-tag">TRIBUTE: $50.00</div>
                                <button class="pay-btn" onclick="requisition('${m}', ${idx})">Authorize View</button>
                            </div>
                            <img src="${ghBase + img}" class="master-img" id="img-${m}-${idx}">
                        </div>
                    `;
                });
            });
        }

        function requisition(m, idx) {
            // Update Debt
            sessionDebt += 50.00;
            document.getElementById('debt').innerText = sessionDebt.toFixed(2);
            document.getElementById('status').innerText = "AUTHORIZED";

            // Unlock Image
            const overlay = document.getElementById(`overlay-${m}-${idx}`);
            const img = document.getElementById(`img-${m}-${idx}`);
            const timer = document.getElementById(`timer-${m}-${idx}`);
            
            overlay.style.opacity = "0";
            overlay.style.pointerEvents = "none";
            img.classList.add('unlocked');
            timer.style.display = "block";

            // The Re-Lock Timer (60 Seconds)
            let timeLeft = 60;
            const countdown = setInterval(() => {
                timeLeft--;
                timer.innerText = timeLeft + "s";
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    lock(m, idx);
                }
            }, 1000);
        }

        function lock(m, idx) {
            const overlay = document.getElementById(`overlay-${m}-${idx}`);
            const img = document.getElementById(`img-${m}-${idx}`);
            const timer = document.getElementById(`timer-${m}-${idx}`);
            
            overlay.style.opacity = "1";
            overlay.style.pointerEvents = "auto";
            img.classList.remove('unlocked');
            timer.style.display = "none";
            timer.innerText = "60s";
            document.getElementById('status').innerText = "UNWORTHY";
        }

        window.onload = build;
    </script>
</body>
</html>
