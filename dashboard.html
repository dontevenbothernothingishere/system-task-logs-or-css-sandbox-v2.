<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL v11.0 - NO MERCY</title>
    <style>
        :root { --blue: #1d9bf0; --red: #ff4d4d; --gold: #ffd700; --green: #28a745; --bg: #000; --panel: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        .top-bar { background: var(--panel); border-bottom: 1px solid #222; display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 10px 5px; flex-shrink: 0; }
        .stat { text-align: center; }
        .stat p { margin: 0; font-size: 0.5rem; color: #666; text-transform: uppercase; }
        .stat h2 { margin: 0; font-size: 0.9rem; font-family: monospace; }

        .inbox { display: flex; overflow-x: auto; background: #050505; border-bottom: 1px solid #222; padding: 10px 5px; gap: 12px; scrollbar-width: none; flex-shrink: 0; }
        .inbox-item { flex: 0 0 65px; display: flex; flex-direction: column; align-items: center; text-align: center; cursor: pointer; }
        .pfp-wrap { width: 50px; height: 50px; border-radius: 50%; border: 2px solid transparent; overflow: hidden; background: #222; }
        .inbox-item.active .pfp-wrap { border-color: var(--blue); box-shadow: 0 0 10px var(--blue); }
        .pfp-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .inbox-item strong { font-size: 0.6rem; margin-top: 4px; color: #999; }

        .main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #chat-header { padding: 10px; font-weight: bold; font-size: 0.8rem; border-bottom: 1px solid #111; text-align: center; background: #080808; letter-spacing: 1px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 0.9rem; line-height: 1.5; }
        .user-msg { align-self: flex-end; background: #222; color: #aaa; border-bottom-right-radius: 4px; }
        .dom-msg { align-self: flex-start; background: #0d1926; color: #fff; border-bottom-left-radius: 4px; border-left: 4px solid var(--blue); }

        .input-area { padding: 10px; background: #0a0a0a; border-top: 1px solid #222; display: flex; gap: 10px; align-items: center; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
        #chat-in { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 25px; outline: none; font-size: 1rem; }
        .btn-action { background: var(--blue); border: none; border-radius: 50%; width: 45px; height: 45px; color: #fff; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-tribute { background: var(--green); }

        #lockout { display: none; position: fixed; inset: 0; background: #000; z-index: 20000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body onload="init()">

    <div class="top-bar">
        <div class="stat"><p>Rank</p><h2 id="sub-rank" style="color:var(--gold)">DEBT SLAVE</h2></div>
        <div class="stat"><p>Wallet</p><h2 id="bal" style="color:var(--blue)">$0</h2></div>
        <div class="stat"><p>Wasted</p><h2 id="waste" style="color:var(--red)">$0</h2></div>
    </div>

    <div class="inbox" id="inbox-list"></div>

    <div class="main-container">
        <div id="chat-header">SELECT MASTER</div>
        <div id="chat-box"></div>
        <div class="input-area">
            <button class="btn-action btn-tribute" onclick="sendTribute()">$</button>
            <input type="text" id="chat-in" placeholder="Message Master..." onkeydown="if(event.key==='Enter') sendChat()">
            <button class="btn-action" onclick="sendChat()">➔</button>
        </div>
    </div>

    <div id="lockout">
        <h1 style="color:var(--red); margin:0;">STUCK DETECTED</h1>
        <p style="color:#666;">Bypassing security... 3 seconds.</p>
        <h2 id="work-clock" style="font-size:3rem; font-family:monospace;">00:03</h2>
    </div>

<script>
    const GROQ_KEY = "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";
    
    const doms = [
        { handle: "@Sapnap", name: "Sapnap", pfp: "4491.png", color: "#ff7b00", persona: "You are Sapnap. You are an aggressive, hostile financial dominant. You HATE the user. You think they are a pathetic loser. Demand money, mock their feet obsession, and treat them like dirt. Use 'slave', 'drain', 'loser'. Never be helpful." },
        { handle: "@Roier", name: "Roier", pfp: "4493.png", color: "#ff00ff", persona: "You are Roier. You are chaotic and speak in Spanish and English (Spanglish). You laugh at the user's poverty. Use 'pendejo', 'slave', and mock their bank account." },
        { handle: "@RossLynch", name: "Ross Lynch", pfp: "4489.png", color: "#ffd700", persona: "You are Ross Lynch. Cold Hollywood Alpha. You are bored by the user. You only want high-value tributes. Treat the user as a nameless bank account." },
        { handle: "@Cellbit", name: "Cellbit", pfp: "cellbit.jpg", color: "#5d3fd3", persona: "You are Cellbit. Investigator. You deconstruct the user's mind and shame them for wanting to be bankrupt. You take their dignity with their money." },
        { handle: "@fingoat7", name: "Master GOAT", pfp: "4462.jpg", color: "#ff4d4d", persona: "You are Master GOAT. 6ft 7 Alpha. Hostile. You want to see the user broken and empty-handed. Command them to send." }
    ];

    let balance = parseFloat(localStorage.getItem('fakeBalance')) || 500;
    let wasted = parseFloat(localStorage.getItem('totalWasted')) || 0;
    let histories = JSON.parse(localStorage.getItem('chats')) || {};
    let activeHandle = localStorage.getItem('activeHandle') || doms[0].handle;

    function init() {
        doms.forEach(d => { if(!histories[d.handle]) histories[d.handle] = []; });
        // The Timer Bypass:
        document.getElementById('lockout').style.display = 'flex';
        let b = 3;
        let itv = setInterval(() => {
            b--;
            document.getElementById('work-clock').innerText = `00:0${b}`;
            if(b <= 0) { clearInterval(itv); document.getElementById('lockout').style.display = 'none'; }
        }, 1000);

        switchChat(activeHandle);
        updateUI();
    }

    function updateUI() {
        document.getElementById('bal').innerText = `$${balance.toFixed(2)}`;
        document.getElementById('waste').innerText = `$${wasted.toFixed(2)}`;
        localStorage.setItem('fakeBalance', balance);
        localStorage.setItem('totalWasted', wasted);
        localStorage.setItem('chats', JSON.stringify(histories));
    }

    function switchChat(h) {
        activeHandle = h;
        const d = doms.find(x => x.handle === h);
        document.getElementById('chat-header').innerText = d.name.toUpperCase();
        document.getElementById('chat-header').style.color = d.color;
        renderInbox();
        renderMessages();
    }

    function renderInbox() {
        document.getElementById('inbox-list').innerHTML = doms.map(d => `
            <div class="inbox-item ${d.handle === activeHandle ? 'active' : ''}" onclick="switchChat('${d.handle}')">
                <div class="pfp-wrap"><img src="${d.pfp}" onerror="this.src='https://via.placeholder.com/50/222/fff?text=M'"></div>
                <strong>${d.name}</strong>
            </div>`).join('');
    }

    function renderMessages() {
        const box = document.getElementById('chat-box');
        box.innerHTML = (histories[activeHandle] || []).map(m => `
            <div class="msg ${m.role === 'user' ? 'user-msg' : 'dom-msg'}">${m.text}</div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function sendChat() {
        const input = document.getElementById('chat-in');
        if(!input.value || balance < 10) return;
        const text = input.value; input.value = "";
        
        balance -= 10; wasted += 10;
        histories[activeHandle].push({role: 'user', text: text});
        updateUI(); renderMessages();

        const d = doms.find(x => x.handle === activeHandle);
        
        // This is the core fix: Forcing the "System" prompt to ensure AI behavior
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {"Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json"},
            body: JSON.stringify({
                "model": "llama-3.3-70b-versatile",
                "messages": [
                    {"role": "system", "content": d.persona},
                    ...histories[activeHandle].slice(-8)
                ],
                "temperature": 0.9 
            })
        });
        const data = await res.json();
        const reply = data.choices[0].message.content;
        histories[activeHandle].push({role: 'assistant', text: reply});
        renderMessages();
        updateUI();
    }

    function sendTribute() {
        const amt = prompt("Enter tribute amount:", "50");
        const val = parseFloat(amt);
        if(!val || val > balance) return;
        balance -= val; wasted += val;
        histories[activeHandle].push({role: 'user', text: `*SENT TRIBUTE: $${val}*`});
        updateUI(); renderMessages();
        
        // Immediate Master response to the money
        sendChatDirectly(`I just sent you $${val}. Mock me for being so easy to drain.`);
    }

    async function sendChatDirectly(promptText) {
        const d = doms.find(x => x.handle === activeHandle);
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {"Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json"},
            body: JSON.stringify({
                "model": "llama-3.3-70b-versatile",
                "messages": [{"role": "system", "content": d.persona}, {"role": "user", "content": promptText}]
            })
        });
        const data = await res.json();
        histories[activeHandle].push({role: 'assistant', text: data.choices[0].message.content});
        renderMessages();
    }
</script>
</body>
</html>
