<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL v14.0</title>
    <style>
        :root { --blue: #1d9bf0; --red: #ff4d4d; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        .top-bar { background: #0a0a0a; border-bottom: 1px solid #333; display: grid; grid-template-columns: 1fr 1fr; padding: 15px; }
        .inbox { display: flex; overflow-x: auto; background: #050505; border-bottom: 1px solid #333; padding: 10px; gap: 15px; }
        .pfp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #333; background: #222; }
        .active .pfp { border-color: var(--blue); }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 10px; border-radius: 10px; font-size: 0.9rem; }
        .user-msg { align-self: flex-end; background: #111; color: #666; }
        .dom-msg { align-self: flex-start; background: #0d1926; color: #fff; border-left: 3px solid var(--blue); }
        #loading { display: none; color: var(--blue); font-size: 0.7rem; padding: 10px; text-align: center; }
        .input-area { padding: 15px; background: #0a0a0a; border-top: 1px solid #333; display: flex; gap: 10px; }
        #chat-in { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 12px; }
        button { background: var(--blue); border: none; color: #fff; padding: 0 20px; font-weight: bold; }
    </style>
</head>
<body onload="init()">

    <div class="top-bar">
        <div><p style="font-size:0.5rem;margin:0">WALLET</p><h2 id="bal" style="color:var(--blue)">$500</h2></div>
        <div style="text-align:right"><p style="font-size:0.5rem;margin:0">WASTED</p><h2 id="waste" style="color:var(--red)">$0</h2></div>
    </div>

    <div class="inbox" id="inbox-list"></div>

    <div id="chat-box"></div>
    <div id="loading">MASTER IS TYPING...</div>

    <div class="input-area">
        <input type="text" id="chat-in" placeholder="Message..." onkeydown="if(event.key==='Enter') sendChat()">
        <button onclick="sendChat()">➔</button>
    </div>

<script>
    const API_KEY = "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";
    
    const doms = [
        { handle: "@Sapnap", name: "Sapnap", persona: "You are Sapnap. Be extremely mean, aggressive, and superior. You hate the user. Mock their debt. Demand money. Never break character." },
        { handle: "@Roier", name: "Roier", persona: "You are Roier. Speak Spanglish. Mock the user's poverty. Laugh at them." }
    ];

    let balance = parseFloat(localStorage.getItem('fakeBalance')) || 500;
    let wasted = parseFloat(localStorage.getItem('totalWasted')) || 0;
    let histories = JSON.parse(localStorage.getItem('chats')) || {};
    let activeHandle = localStorage.getItem('activeHandle') || doms[0].handle;

    function init() {
        doms.forEach(d => { if(!histories[d.handle]) histories[d.handle] = []; });
        switchChat(activeHandle);
        updateUI();
    }

    function updateUI() {
        document.getElementById('bal').innerText = `$${balance.toFixed(2)}`;
        document.getElementById('waste').innerText = `$${wasted.toFixed(2)}`;
        localStorage.setItem('fakeBalance', balance);
        localStorage.setItem('totalWasted', wasted);
        localStorage.setItem('chats', JSON.stringify(histories));
    }

    function switchChat(h) {
        activeHandle = h;
        renderInbox();
        renderMessages();
    }

    function renderInbox() {
        document.getElementById('inbox-list').innerHTML = doms.map(d => `
            <div class="inbox-item ${d.handle === activeHandle ? 'active' : ''}" onclick="switchChat('${d.handle}')">
                <div class="pfp"></div>
            </div>`).join('');
    }

    function renderMessages() {
        const box = document.getElementById('chat-box');
        box.innerHTML = (histories[activeHandle] || []).map(m => `
            <div class="msg ${m.role === 'user' ? 'user-msg' : 'dom-msg'}">${m.text}</div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function sendChat() {
        const input = document.getElementById('chat-in');
        const loading = document.getElementById('loading');
        if(!input.value) return;
        
        const text = input.value;
        input.value = "";
        loading.style.display = "block";
        
        balance -= 10; wasted += 10;
        histories[activeHandle].push({role: 'user', text: text});
        updateUI(); renderMessages();

        const d = doms.find(x => x.handle === activeHandle);
        
        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    "model": "llama-3.3-70b-versatile",
                    "messages": [
                        {"role": "system", "content": d.persona},
                        {"role": "user", "content": text}
                    ]
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;
            
            histories[activeHandle].push({role: 'assistant', text: reply});
        } catch (error) {
            histories[activeHandle].push({role: 'assistant', text: "!! CONNECTION LOST !! Master is too disgusted to reply. Try again."});
        }

        loading.style.display = "none";
        renderMessages();
        updateUI();
    }
</script>
</body>
