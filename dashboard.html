        #ruin-btn { background: #1a0000; color: #600; border: 1px solid #300; font-size: 0.7rem; margin-top: auto; }

</head>

        async function sendChat() {

            let timeLeft = seconds; clearInterval(timer);

                if(timeLeft <= 0) { clearInterval(timer); document.getElementById('comp-btn').disabled = false; return; }
