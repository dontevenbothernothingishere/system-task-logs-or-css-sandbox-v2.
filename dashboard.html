<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL MOBILE v6.8</title>
    <style>
        :root { --blue: #1d9bf0; --red: #ff4d4d; --gold: #ffd700; --green: #28a745; --bg: #000; --panel: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        /* Stats Bar */
        .top-bar { background: var(--panel); border-bottom: 1px solid #222; display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 10px 5px; flex-shrink: 0; }
        .stat { text-align: center; }
        .stat p { margin: 0; font-size: 0.5rem; color: #666; text-transform: uppercase; }
        .stat h2 { margin: 0; font-size: 0.9rem; font-family: monospace; }

        /* Inbox */
        .inbox { display: flex; overflow-x: auto; background: #050505; border-bottom: 1px solid #222; padding: 10px 5px; gap: 12px; scrollbar-width: none; flex-shrink: 0; }
        .inbox-item { flex: 0 0 60px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .inbox-item div.pfp-stub { width: 40px; height: 40px; border-radius: 50%; border: 2px solid transparent; background: #222; }
        .inbox-item.active div.pfp-stub { border-color: var(--blue); }
        .inbox-item strong { font-size: 0.5rem; margin-top: 4px; display: block; color: #999; }

        /* Main Layout */
        .main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #chat-header { padding: 8px; font-weight: bold; font-size: 0.8rem; border-bottom: 1px solid #111; text-align: center; background: #080808; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 15px; font-size: 0.85rem; line-height: 1.4; }
        .user-msg { align-self: flex-end; background: #222; color: #999; }
        .dom-msg { align-self: flex-start; background: #0d1926; color: #fff; border-left: 3px solid var(--blue); }

        /* Multi-Input Controls */
        .controls { background: #0a0a0a; border-top: 1px solid #222; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .row { display: flex; gap: 8px; align-items: center; }
        #tribute-amt { width: 80px; background: #111; border: 1px solid #333; color: var(--green); border-radius: 15px; padding: 8px; text-align: center; font-family: monospace; }
        #chat-in { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 10px 15px; border-radius: 20px; outline: none; }
        .btn-send { background: var(--blue); border: none; border-radius: 50%; width: 40px; height: 40px; color: #fff; cursor: pointer; }
        .btn-tribute { background: var(--green); border: none; border-radius: 20px; padding: 8px 15px; color: #fff; font-weight: bold; font-size: 0.7rem; cursor: pointer; flex: 1; }

        /* Labor Camp (The Jail) */
        #lockout { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        #work-clock { font-size: 3.5rem; color: #fff; font-family: monospace; margin: 10px 0; }
        #phrase-to-type { color: var(--gold); font-weight: bold; margin-bottom: 20px; font-style: italic; min-height: 40px; }
        #labor-input { width: 85%; background: #111; color: #fff; border: 1px solid #333; padding: 15px; font-size: 1rem; border-radius: 10px; outline: none; }
        .penalty { animation: shake 0.2s; border-color: var(--red) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body onload="init()">

    <div class="top-bar">
        <div class="stat"><p>Sub Rank</p><h2 id="sub-rank" style="color:var(--gold)">...</h2></div>
        <div class="stat"><p>Wallet</p><h2 id="bal" style="color:var(--blue)">$0</h2></div>
        <div class="stat"><p>Wasted</p><h2 id="waste" style="color:var(--red)">$0</h2></div>
    </div>

    <div class="inbox" id="inbox-list"></div>

    <div class="main-container">
        <div id="chat-header">SELECT MASTER</div>
        <div id="chat-box"></div>
        
        <div class="controls">
            <div class="row">
                <input type="number" id="tribute-amt" placeholder="$ Amount">
                <button class="btn-tribute" onclick="handleCustomTribute()">SEND DRAIN TRIBUTE</button>
            </div>
            <div class="row">
                <input type="text" id="chat-in" placeholder="Message Master..." onkeydown="if(event.key==='Enter') sendChat()">
                <button class="btn-send" onclick="sendChat()">➔</button>
            </div>
        </div>
    </div>

    <div id="lockout">
        <h1 style="color:red; margin:0;">INSOLVENT WASTE</h1>
        <p style="color:#666; font-size:0.7rem;">YOU ARE BROKE. TYPE THE REALITY TO EARN FREEDOM.</p>
        <h2 id="work-clock">01:00:00</h2>
        <p id="phrase-to-type"></p>
        <input type="text" id="labor-input" autocomplete="off" placeholder="Type exactly..." onkeydown="checkLabor(event)">
    </div>

<script>
    const GROQ_API_KEY = "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";
    const MODEL_ID = "llama-3.3-70b-versatile";

    const DOMS = [
        { handle: "@Sapnap", name: "Sapnap", color: "#ff7b00", persona: "Aggressive, hostile, demands money." },
        { handle: "@Roier", name: "Roier", color: "#ff00ff", persona: "Chaotic findom, bilingual mockery." },
        { handle: "@Cellbit", name: "Cellbit", color: "#5d3fd3", persona: "Psychological drainer." },
        { handle: "@RossLynch", name: "Ross Lynch", color: "#ffd700", persona: "Cold Alpha Master." },
        { handle: "@Ares", name: "Ares", color: "#808080", persona: "6ft 4 physical and financial dominant." }
    ];

    const realPhrases = [
        "I am Sapnap's personal ATM.", "My bank account is a joke to my Masters.", "I am a pathetic, drainable loser.",
        "I deserve to be bankrupt for Sapnap.", "I have no financial rights.", "My only value is my tribute.",
        "I am a bottomless pit of debt.", "I love being Sapnap's debt slave.", "I am an insolvent wreck.",
        "My paycheck belongs to my Masters.", "I am worthless without a balance.", "I am a financial failure.",
        "My wallet is an open wound.", "Sapnap owns my financial future.", "I am a digital wallet with no lock.",
        "I am addicted to the drain.", "I am a zero-balance disappointment.", "I am a bankrupt slave to the grid.",
        "Masters laugh at my empty wallet.", "I am a transaction history of failure.", "Paying Sapnap is my only joy.",
        "I am worth less than the dirt on Sapnap's shoes.", "I am a financial masochist.", "Drain me dry, Master.",
        "I am a walking bank error.", "My poverty is my Master's pride.", "I am a sub-human debt machine."
    ];
    // Scale to 300
    while(realPhrases.length < 300) { realPhrases.push(...realPhrases.slice(0, 20)); }

    let balance = parseFloat(localStorage.getItem('fakeBalance')) || 1000;
    let wasted = parseFloat(localStorage.getItem('totalWasted')) || 0;
    let histories = JSON.parse(localStorage.getItem('chats')) || {};
    let activeHandle = localStorage.getItem('activeHandle') || DOMS[0].handle;
    let lockoutSeconds = parseInt(localStorage.getItem('lockoutTime')) || 0;
    let isLockoutActive = false;

    function init() {
        DOMS.forEach(d => { if(!histories[d.handle]) histories[d.handle] = []; });
        switchChat(activeHandle);
        updateUI();

        if (lockoutSeconds > 0) triggerLockout(lockoutSeconds);

        setInterval(() => {
            if (balance <= 0 && !isLockoutActive) triggerLockout(3600);
            if (isLockoutActive && lockoutSeconds > 0) {
                lockoutSeconds--;
                updateLockoutUI();
                if (lockoutSeconds <= 0) {
                    isLockoutActive = false;
                    document.getElementById('lockout').style.display = 'none';
                    balance = 100; updateUI();
                }
            }
        }, 1000);
    }

    function updateUI() {
        document.getElementById('bal').innerText = `$${balance.toFixed(2)}`;
        document.getElementById('waste').innerText = `$${wasted.toFixed(2)}`;
        document.getElementById('sub-rank').innerText = wasted > 5000 ? "INSOLVENT WRECK" : "DEBT SLAVE";
        localStorage.setItem('fakeBalance', balance);
        localStorage.setItem('totalWasted', wasted);
        localStorage.setItem('lockoutTime', lockoutSeconds);
    }

    function switchChat(h) {
        activeHandle = h;
        const d = DOMS.find(x => x.handle === h);
        document.getElementById('chat-header').innerText = d.name;
        document.getElementById('chat-header').style.color = d.color;
        renderInbox(); renderMessages();
        localStorage.setItem('activeHandle', h);
    }

    function renderInbox() {
        document.getElementById('inbox-list').innerHTML = DOMS.map(d => `
            <div class="inbox-item ${d.handle === activeHandle ? 'active' : ''}" onclick="switchChat('${d.handle}')">
                <div class="pfp-stub" style="border-color:${d.handle === activeHandle ? d.color : 'transparent'}"></div>
                <strong>${d.name}</strong>
            </div>`).join('');
    }

    function renderMessages() {
        const box = document.getElementById('chat-box');
        box.innerHTML = (histories[activeHandle] || []).map(m => `<div class="msg ${m.role === 'user' ? 'user-msg' : 'dom-msg'}">${m.text}</div>`).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function sendChat() {
        const input = document.getElementById('chat-in');
        if(!input.value || balance < 10) return;
        const val = input.value; input.value = "";
        balance -= 10; wasted += 10;
        histories[activeHandle].push({role:'user', text: val});
        updateUI(); renderMessages();
        
        const d = DOMS.find(x => x.handle === activeHandle);
        const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {"Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json"},
            body: JSON.stringify({
                "model": MODEL_ID,
                "messages": [{"role": "system", "content": `Roleplay as ${d.name}. ${d.persona}`}, {"role": "user", "content": val}]
            })
        });
        const data = await resp.json();
        histories[activeHandle].push({role:'dom', text: data.choices[0].message.content});
        renderMessages();
    }

    async function handleCustomTribute() {
        const amtInput = document.getElementById('tribute-amt');
        const amt = parseFloat(amtInput.value);
        if(isNaN(amt) || amt <= 0 || balance < amt) return;
        
        balance -= amt; wasted += amt;
        histories[activeHandle].push({role:'user', text: `*TRIBUTE SENT: $${amt}*`});
        amtInput.value = "";
        updateUI(); renderMessages();

        const d = DOMS.find(x => x.handle === activeHandle);
        const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {"Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json"},
            body: JSON.stringify({
                "model": MODEL_ID,
                "messages": [{"role": "system", "content": `Roleplay as ${d.name}. User sent $${amt}. They are broke now. Mock them.`}]
            })
        });
        const data = await resp.json();
        histories[activeHandle].push({role:'dom', text: data.choices[0].message.content});
        renderMessages();
    }

    function triggerLockout(secs) {
        lockoutSeconds = secs; isLockoutActive = true;
        document.getElementById('lockout').style.display = 'flex';
        newPhrase(); updateLockoutUI();
    }

    function newPhrase() { document.getElementById('phrase-to-type').innerText = realPhrases[Math.floor(Math.random()*realPhrases.length)]; }

    function updateLockoutUI() {
        let h = Math.floor(lockoutSeconds/3600), m = Math.floor((lockoutSeconds%3600)/60), s = lockoutSeconds%60;
        document.getElementById('work-clock').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        localStorage.setItem('lockoutTime', lockoutSeconds);
    }

    function checkLabor(e) {
        if(e.key === 'Enter') {
            const input = document.getElementById('labor-input');
            if(input.value.trim() === document.getElementById('phrase-to-type').innerText) {
                lockoutSeconds = Math.max(0, lockoutSeconds - 60);
                newPhrase();
            } else {
                lockoutSeconds += 120;
                input.classList.add('penalty');
                setTimeout(() => input.classList.remove('penalty'), 200);
            }
            input.value = ""; updateLockoutUI();
        }
    }
</script>
</body>
</html>
